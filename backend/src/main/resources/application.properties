server.port=8080
spring.application.name=zpl-viewer-backend

# 條碼水平最小間距（mm），兩條碼水平間距小於此值時觸發警告
zpl.barcode.min-horizontal-gap-mm=2.5

# 安全邊界（mm），距離標籤各邊緣超出此值時觸發警告
zpl.margin.top-mm=1
zpl.margin.bottom-mm=1
zpl.margin.left-mm=3
zpl.margin.right-mm=8

# 重疊判定閾值（mm），兩欄位交集的寬 AND 高都超過此值才視為重疊（0 = 任何交集均觸發）
zpl.overlap.threshold-mm=0
